

# ============================================================== 
# Cameras
# ==============================================================

[camera.front]
fps = 15                    # 15, 30, 60, 120
resolution = "SVGA"         # SVGA = 960x600 [pixels]
serial_number = 42146143    # 2.2mm big lens
record = false              # Save SVO video recordings to disk (at logs/recordings/front_YYYYMMDD_HHMMSS.svo)
display = false             # Convert frames to JPEG and stream to web app

[camera.front.depth]
enable = false              # Enable depth perception

[camera.front.body_tracking]
enable = false
detection_confidence = 40                  
#detection_model = "HUMAN_BODY_FAST"     # FAST, MEDIUM, ACCURATE


[camera.back]
fps = 15                    # 15, 30, 60, 120
resolution = "SVGA"         # SVGA = 960x600 [pixels]
serial_number = 40329509    # 4mm small lens
record = false              # Save SVO video recordings to disk (at logs/recordings/back_YYYYMMDD_HHMMSS.svo)
display = false             # Convert frames to JPEG and stream to web app

[camera.back.depth]
enable = false              # Enable depth perception

[camera.back.body_tracking]
enable = true
detection_confidence = 40
#detection_model = "HUMAN_BODY_FAST"    # FAST, MEDIUM, ACCURATE

# ============================================================== 
# Vision processing
# ==============================================================

[frame_encoding]
jpeg_quality = 80       # 0-100 (higher = better)
jpeg_scale = 0.5        # Fraction to scale down frames for display (e.g. in web app) to reduce bandwidth and CPU usage

[lane_detector]
canny_sigma = 0.33    #0.33      # Standard deviation of Gaussian blur before edge detection (higher = more blur = fewer edges)
angle_threshold = 75            # [degrees] Max angle from vertical for a line to be considered a lane line
hough_threshold = 90  #90        # Minimum Hough accumulator votes to accept a line.
mask_polygons = [                # Polygonal masks to filter out / ignore during lane detection
[[324, 172], [324, 70], [440,69], [610, 172]],  # Mask battery box
[[257,172], [270, 155], [336, 150], [336, 172]] # Mask car hood
]
cut_top = 0.571         # fraction of image height to crop (4/7)
output_width = 640      # pixels to resize width to before lane detection (height is scaled proportionally)

# ============================================================== 
# Control parameters
# ==============================================================

# Feedforward speed model parameters for converting desired speed (m/s) to PWM (microsecond pulse width)
[speed_model]
gain = 20.23                # m/s to PWM factor for default affine speed model
bias = 1540                 # Neutral PWM value for 0 m/s (seems to be a deadband around 1500-1600)
coefficients = [20.23, 1540] # Coefficients for polynomial speed model (starting with highest degree)

[lane_keeping]
cut_top = 0.571             # fraction of image height to crop (4/7)
angle_threshold = 50        # [degrees]
angle_setpoint = 90         # starting angle [deg] (0 = left, 90 = straight, 180 = right)
position_setpoint = 363     # pixels
set_width = 640             # pixels
show_lines = false          # Draw lane lines on the video stream (for display / debugging)

[lane_keeping.pid.angle]
kp = 0.9
ki = 0.0
kd = 0.06
beta = 1.0                  # Setpoint weighting for proportional term
gamma = 1.0                 # Setpoint weighting for derivative term

[lane_keeping.pid.position]
kp = 0.03
ki = 0.0
kd = 0.03
beta = 1.0                  # Setpoint weighting for proportional term
gamma = 1.0

# --- Constant speed mode: ---
# --- Hold a target speed or reach a target split time (Open or closed loop) ---
[constant_speed]
target_speed = 1.0          # [m/s] Target speed to hold
target_duration = 1.0       # [s]
target_distance = 0.0       # [m] If set - run until this distance is reached (overrides target_duration
profile = "linear"          # Velocity profile for smooth acceleration: linear | exponential | sigmoid (params in [velocity_profile])

# --- Cruise controller: Cascaded speed + odometry control for following a pacing profile ---
[cruise_control]
pacing_profile = "test.csv" # selected CSV in pacing_profiles/ (set from the web app)
k_s = 0.05                  # [1/s] outer-loop gain: integral speed correction per meter off from pacing profile
cf_tau = 1.0                # [s] complementary filter time constant (larger = trust dead reckoning longer between GNSS fixes)
pwm_min = 1540              # actuator lower bound [pwm] (neutral - no reverse)
pwm_max = 1560              # actuator upper bound [pwm] (real safety values should be hardcoded in the Arduino)
t_control_switch = 3.0      # [s] Time filter between cruise control vs. distance control switch
catchup_tolerance_m = 2.0 # [m] schedule deficit (s_ref - s_meas) that's acceptable for switching back to cruise from distance control
runner_timeout = 10.0       # [s] Safety watchdog: quit Normal mode if the runner is missing or stationary this long (0 = disabled)

[cruise_control.pid]
kp = 30.0                   # [pwm per m/s] proportional trim on speed error
ki = 10.0                   # [pwm per m/s/s] integral trim on speed error
kd = 0.0
beta = 1.0
gamma = 1.0

[distance_control]
d_min = 2.0                 # [meters] Setpoint for distance control: (d_max - d_min)/2
d_max = 6.0                 # [meters]
runner_lost_timeout = 0.5   # [s] Keep running through body-tracking dropouts shorter than this (run-signal debounce)
runner_acquire_time = 0.0   # [s] Require the runner to be seen this long before starting (0 = start immediately)
profile = "linear"          # Velocity profile for smooth acceleration: linear | exponential | sigmoid (params in [velocity_profile])

[distance_control.pid]
kp = 0.3
ki = 0.0
kd = 0.06
beta = 1.0
gamma = 0.1

# --- Velocity profile parameters ------------------------------------------------------------
[velocity_profile.linear]
t_accel = 4.0               # [seconds] Time to reach target speed during linear acceleration

[velocity_profile.exponential]
alpha = 0.7                 # Higher alpha = faster acceleration

[velocity_profile.sigmoid]
k = 2.0                     # (1.5) Steepness: higher = faster transition through the middle
s = 3.0                     # (7) Inflection point: time at which the transition is at its midpoint

# PID parameters)
[pid.motor]
kp = 80.0                   # 80.0
ki = 1251.0                 # 1251.0
kd = 0.0                    # 0.0

# ============================================================== 
# GNSS
# ==============================================================

[gnss]
#device = "/dev/ttyACM0"
#baud_rate = 115200
measurement_rate = 10       # [Hz]
speed_threshold = 0.07      # m/s - minimum speed threshold to consider valid (to filter out noise when stationary)

# ============================================================== 
# Arduino
# ============================================================== 

[arduino.socket]
host = "192.168.56.1"       # IP address of APM's LAN interface
port = 49152                # Port number of APM's TCP server

[arduino.steer_angle]
neutral = 90
max_right = 45 # Max
max_left = 135 # Max

# Fallback affine speed model (v_hat = v_d * factor + neutral)
[arduino.speed_pwm]
max = 1600                  # Maximum PWM for safety (there's also hardcoded limits in the Arduino code)
neutral = 1540              # Neutral PWM value for 0 m/s
factor = 20.23              # Fallback linear model to convert desired speed (m/s) to PWM (microsecond pulse width)

# ============================================================== 
# NiceGUI web app
# ============================================================== 

[webapp]
host = "0.0.0.0"
port = 8080
jpeg_quality = 80       # 0-100 (higher = better)
jpeg_scale = 0.5        # Fraction to scale down frames for display (e.g. in web app) to reduce bandwidth and CPU usage

# ============================================================== 
# Logging
# ==============================================================

[logging]
# Levels: DEBUG < INFO < WARNING < ERROR < CRITICAL
level = "DEBUG"     # Default root logger level = level of any logger without a specific override in [logging.levels]

[logging.levels]
# Per-module overrides (e.g. to increase verbosity for debugging / reduce it for noisy modules

"apm.control.cruise_controller" = "INFO"
"apm.control.distance_controller" = "INFO"

"apm.drivers.arduino" = "INFO"
"apm.drivers.camera.front" = "INFO"
"apm.drivers.camera.back" = "INFO"
"apm.drivers.gnss" = "INFO"

"apm.vision.frame_encoder" = "WARNING"
"apm.vision.line_detector" = "WARNING"